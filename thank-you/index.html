    <style>

        :root { --ink:#0F1B2A; --ink-soft:#334438; --paper:#F6F1E6; --paper-strong:#FFFDF7; --line:#D8C6B3; --navy:#1E3D34; --coral:#E76F4F; --sage:#7A8158; --radius:8px; }

        .card { max-width:560px; text-align:center; background:var(--paper-strong); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 18px 48px rgba(15,27,42,.1); padding:48px 36px; }

        p { margin-top:16px; color:var(--ink-soft); font-size:1.06rem; }
        .button { display:inline-flex; align-items:center; justify-content:center; min-height:48px; padding:13px 22px; border-radius:var(--radius); font-weight:900; border:2px solid var(--coral); background:var(--coral); color:#fff; margin-top:28px; }
        .kicker { color:var(--coral); font-weight:900; text-transform:uppercase; letter-spacing:.08em; font-size:13px; margin-bottom:14px; }
    </style>
